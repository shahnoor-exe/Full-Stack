<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Review Platform</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            text-align: center;
        }
        .genre-section {
            margin-bottom: 30px;
        }
        .genre-title {
            background-color: #333;
            color: white;
            padding: 8px 15px;
        }
        .movie-card {
            border: 1px solid #ccc;
            background: white;
            padding: 15px;
            margin: 10px 0;
        }
        .movie-title {
            font-size: 18px;
            font-weight: bold;
        }
        .review-form {
            margin-top: 10px;
        }
        .review-form input, .review-form select, .review-form textarea {
            display: block;
            margin: 5px 0;
            padding: 5px;
            width: 300px;
        }
        .review-form textarea {
            height: 50px;
        }
        .review-form button {
            margin-top: 5px;
            padding: 5px 15px;
            cursor: pointer;
        }
        .review-box {
            border: 1px solid #aaa;
            padding: 8px;
            margin-top: 5px;
            background: #fafafa;
        }
        .positive {
            border-left: 4px solid green;
        }
        .negative {
            border-left: 4px solid red;
        }
        .neutral {
            border-left: 4px solid orange;
        }
    </style>
</head>
<body>

    <h1>Movie Review Platform</h1>

    <div>
        <label><b>Filter by Genre: </b></label>
        <select id="genreFilter" onchange="render()">
            <option value="all">All Genres</option>
        </select>

        &nbsp;&nbsp;

        <label><b>Filter Reviews: </b></label>
        <select id="reviewFilter" onchange="render()">
            <option value="all">All Reviews</option>
            <option value="positive">Positive</option>
            <option value="neutral">Neutral</option>
            <option value="negative">Negative</option>
        </select>
    </div>
    <br>

    <div id="app"></div>

    <script src="q3.js"></script>

</body>
</html>
